<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard · Valorant OCE Utilities</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #FF4655;
      --red-dim:    rgba(255,70,85,0.10);
      --red-border: rgba(255,70,85,0.30);
      --bg:         #0a0a0c;
      --surface:    #111214;
      --surface-2:  #16191e;
      --text-muted: #3a4252;
      --text:       #5e6e88;
      --text-mid:   #8a9ab8;
      --text-bright:#edf2fa;
      --border:     rgba(255,255,255,0.06);
      --border-mid: rgba(255,255,255,0.11);
      --radius-sm:  4px;
      --radius:     8px;
      --nav-h:      62px;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px; height: var(--nav-h);
      background: rgba(10,10,12,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-text { font-size: 15px; font-weight: 800; color: var(--text-bright); letter-spacing: -0.01em; }
    .nav-logo-text span { color: var(--red); }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link { font-size: 14px; font-weight: 500; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border-radius: var(--radius-sm); transition: color 0.15s, background 0.15s; }
    .nav-link:hover { color: var(--text-bright); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--text-bright); }
    .nav-cta { font-size: 13px; font-weight: 700; color: #fff; background: var(--red); padding: 7px 16px; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 3px 3px 0 0 rgba(255,70,85,0.5); transition: transform 0.12s, box-shadow 0.12s; }
    .nav-cta:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 rgba(255,70,85,0.5); }

    /* ── PAGE ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px 100px;
    }

    /* ── HEADER ── */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--red); margin-bottom: 20px;
    }
    .eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--text-bright); letter-spacing: -0.035em; line-height: 1.04; margin-bottom: 14px; }
    h1 em { font-style: normal; color: var(--red); }

    .header-sub { font-size: 15px; color: var(--text); line-height: 1.7; margin-bottom: 40px; }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 7px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-mid);
      background: var(--surface); color: var(--text-muted);
      transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .filter-btn:hover { color: var(--text-bright); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { background: var(--red-dim); border-color: var(--red-border); color: var(--red); }
    .filter-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── META ── */
    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text-muted); margin-bottom: 16px;
      flex-wrap: wrap; gap: 8px;
    }
    .meta-count strong { color: var(--text-mid); }

    /* ── PLAYER ROWS ── */
    .player-list { display: flex; flex-direction: column; gap: 8px; }

    /* Entry animation — rows start invisible, observer triggers .visible */
    .player-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      transition: border-color 0.15s, background 0.15s, transform 0.12s,
                  opacity 0.4s ease, translate 0.4s ease;
      position: relative;
      /* start hidden for scroll-in effect */
      opacity: 0;
      translate: 0 18px;
    }
    .player-row.visible {
      opacity: 1;
      translate: 0 0;
    }
    .player-row:hover {
      border-color: var(--border-mid);
      background: var(--surface-2);
      transform: translateX(3px);
    }
    .player-row.highlighted {
      border-color: var(--red-border);
      background: var(--red-dim);
    }

    .pos {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      min-width: 28px; text-align: right; font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .pos.top3 { color: var(--text-mid); }

    .rank-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .player-row:hover .rank-dot { transform: scale(1.4); }

    .player-name {
      flex: 1; font-size: 15px; font-weight: 700; color: var(--text-bright);
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .player-tag { font-weight: 500; color: var(--text-mid); }

    .player-right {
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .tier-label {
      font-size: 13px; color: var(--text-muted); font-weight: 500; white-space: nowrap;
    }
    .lb-pos { color: var(--text-muted); margin-left: 2px; }

    .rr {
      font-size: 15px; font-weight: 800; color: var(--red);
      font-variant-numeric: tabular-nums; min-width: 64px; text-align: right;
    }

    /* Share button */
    .share-btn {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      opacity: 0; transition: opacity 0.15s;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px 2px; line-height: 0;
    }
    .player-row:hover .share-btn { opacity: 1; }
    .share-btn:hover { color: var(--text-bright); }

    /* hide RR when share button is visible so they don't overlap */
    .player-row:hover .rr { opacity: 0; }

    /* ── RANK DIVIDER ── */
    .rank-divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin: 8px 0 4px;
      opacity: 0; translate: 0 10px;
      transition: opacity 0.4s ease, translate 0.4s ease;
    }
    .rank-divider.visible { opacity: 1; translate: 0 0; }
    .rank-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── STATES ── */
    .loading, .empty-state {
      text-align: center; padding: 80px 24px;
      color: var(--text-muted); font-size: 15px;
    }
    .loading-dots span { animation: dot-blink 1.4s infinite; display: inline-block; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--text-muted);
    }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .footer-links a:hover { color: var(--red); }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .page { padding: 48px 16px 80px; }
      .tier-label { display: none; }
      footer { padding: 16px 20px; flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M13 1L25 13L13 25L1 13Z" fill="rgba(255,70,85,0.12)" stroke="#FF4655" stroke-width="1.5"/>
        <path d="M13 7L19 13L13 19L7 13Z" fill="rgba(255,70,85,0.28)"/>
      </svg>
      <span class="nav-logo-text">Valorant <span>OCE</span> Utilities</span>
    </a>
    <div class="nav-links">
      <a class="nav-link active" href="/leaderboard">Leaderboard</a>
      <a class="nav-link" href="/changelog">Changelog</a>
      <a class="nav-link" href="/demo">Demo</a>
      <a class="nav-cta" href="https://discord.gg/VALORANTOCE" target="_blank" rel="noopener">Join Discord ↗</a>
    </div>
  </nav>

  <div class="page">
    <div class="eyebrow"><span class="eyebrow-dot"></span>Leaderboard</div>
    <h1>See where you <em>rank</em></h1>
    <p class="header-sub">
      Server members sorted by competitive tier and RR.<br>
      Immortal+ show their live leaderboard position.
    </p>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-group="all">All</button>
      <button class="filter-btn" data-group="immortal"><span class="filter-dot" style="background:#BF3136"></span>Immortal+</button>
      <button class="filter-btn" data-group="ascendant"><span class="filter-dot" style="background:#19A97B"></span>Ascendant</button>
      <button class="filter-btn" data-group="diamond"><span class="filter-dot" style="background:#6B56C4"></span>Diamond</button>
      <button class="filter-btn" data-group="platinum"><span class="filter-dot" style="background:#3AB8B3"></span>Platinum</button>
      <button class="filter-btn" data-group="gold"><span class="filter-dot" style="background:#D4AF51"></span>Gold</button>
    </div>

    <div class="meta-row">
      <span class="meta-count" id="meta-count"></span>
      <span id="meta-updated" style="font-size:12px;color:var(--text-muted);font-style:italic"></span>
    </div>

    <div class="player-list" id="player-list">
      <div class="loading">
        Loading<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>

  <footer>
    <span>© 2026 Valorant OCE Utilities · Not affiliated with Riot Games</span>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/changelog">Changelog</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </div>
  </footer>

  <script>
    const TIER_COLORS = {
      3:'#594134',4:'#594134',5:'#594134',
      6:'#9E6230',7:'#9E6230',8:'#9E6230',
      9:'#8BA7B7',10:'#8BA7B7',11:'#8BA7B7',
      12:'#D4AF51',13:'#D4AF51',14:'#D4AF51',
      15:'#3AB8B3',16:'#3AB8B3',17:'#3AB8B3',
      18:'#6B56C4',19:'#6B56C4',20:'#6B56C4',
      21:'#19A97B',22:'#19A97B',23:'#19A97B',
      24:'#BF3136',25:'#BF3136',26:'#BF3136',
      27:'#FFD63A',
    };

    const TIER_GROUP = {
      3:'iron',4:'iron',5:'iron',
      6:'bronze',7:'bronze',8:'bronze',
      9:'silver',10:'silver',11:'silver',
      12:'gold',13:'gold',14:'gold',
      15:'platinum',16:'platinum',17:'platinum',
      18:'diamond',19:'diamond',20:'diamond',
      21:'ascendant',22:'ascendant',23:'ascendant',
      24:'immortal',25:'immortal',26:'immortal',
      27:'radiant',
    };

    // Group labels — show a divider when the rank group changes
    const GROUP_LABEL = {
      radiant:'Radiant', immortal:'Immortal', ascendant:'Ascendant',
      diamond:'Diamond', platinum:'Platinum', gold:'Gold',
      silver:'Silver', bronze:'Bronze', iron:'Iron',
    };

    let allPlayers  = [];
    let activeGroup = 'all';

    const urlParams   = new URLSearchParams(location.search);
    const highlightId = urlParams.get('player');

    // ── Scroll-in observer ──────────────────────────────────────────────
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          // Stagger rows that enter at the same time
          setTimeout(() => e.target.classList.add('visible'), i * 40);
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    // ── Fetch ───────────────────────────────────────────────────────────
    async function loadLeaderboard() {
      try {
        const res  = await fetch('/api/leaderboard');
        const data = await res.json();
        allPlayers = data.players ?? [];

        if (data.updatedAt) {
          const diff = Math.floor((Date.now() - new Date(data.updatedAt)) / 1000);
          const rel  = diff < 60 ? 'just now'
            : diff < 3600   ? Math.floor(diff / 60) + 'm ago'
            : Math.floor(diff / 3600) + 'h ago';
          document.getElementById('meta-updated').textContent = 'Updated ' + rel;
        }

        render();

        if (highlightId) {
          requestAnimationFrame(() => {
            const el = document.querySelector('.player-row.highlighted');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      } catch {
        document.getElementById('player-list').innerHTML =
          '<div class="empty-state">Could not load leaderboard.<p>The bot may not have run yet — try again soon.</p></div>';
      }
    }

    // ── Render ───────────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('player-list');
      const meta = document.getElementById('meta-count');

      const players = activeGroup === 'all'
        ? allPlayers
        : allPlayers.filter(p =>
            activeGroup === 'immortal'
              ? p.tier >= 24
              : TIER_GROUP[p.tier] === activeGroup
          );

      meta.innerHTML = players.length === allPlayers.length
        ? `<strong>${allPlayers.length}</strong> ranked players`
        : `<strong>${players.length}</strong> of ${allPlayers.length} players`;

      if (!allPlayers.length) {
        list.innerHTML = '<div class="empty-state">No leaderboard data yet.<p>The bot publishes rankings on startup and every 6 hours.</p></div>';
        return;
      }
      if (!players.length) {
        list.innerHTML = '<div class="empty-state">No players in this tier yet.</div>';
        return;
      }

      let lastGroup = null;
      const html    = [];

      players.forEach((p, i) => {
        const group   = TIER_GROUP[p.tier];
        const color   = TIER_COLORS[p.tier] ?? '#555';
        const id      = `${p.riotName}#${p.riotTag}`;
        const isHigh  = highlightId && id === highlightId;
        const rrLabel = p.tier >= 24 ? `${p.displayRr} RR` : `${p.rr} RR`;
        const lbBit   = p.leaderboardRank ? `<span class="lb-pos">· #${p.leaderboardRank}</span>` : '';
        const posStr  = String(i + 1).padStart(2, '0');

        // Rank group divider
        if (group !== lastGroup && GROUP_LABEL[group]) {
          html.push(`<div class="rank-divider">${GROUP_LABEL[group]}</div>`);
          lastGroup = group;
        }

        html.push(`<div class="player-row${isHigh ? ' highlighted' : ''}" data-id="${esc(id)}">
          <span class="pos${i < 3 ? ' top3' : ''}">${posStr}</span>
          <span class="rank-dot" style="background:${color};box-shadow:0 0 7px ${color}66"></span>
          <span class="player-name">${esc(p.riotName)}<span class="player-tag">#${esc(p.riotTag)}</span></span>
          <div class="player-right">
            <span class="tier-label">${esc(p.tierName)}${lbBit}</span>
            <span class="rr">${rrLabel}</span>
          </div>
          <button class="share-btn" onclick="sharePlayer(event,'${esc(id)}')" title="Copy link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
        </div>`);
      });

      list.innerHTML = html.join('');

      // Attach scroll observer to every row + divider
      list.querySelectorAll('.player-row, .rank-divider').forEach(el => observer.observe(el));
    }

    // ── Share ───────────────────────────────────────────────────────────
    function sharePlayer(e, id) {
      e.stopPropagation();
      const url = `${location.origin}/leaderboard?player=${encodeURIComponent(id)}`;
      navigator.clipboard.writeText(url).then(() => {
        const btn = e.currentTarget;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(() => {
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
        }, 1500);
      });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Filter ──────────────────────────────────────────────────────────
    document.getElementById('filter-bar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeGroup = btn.dataset.group;
      render();
    });

    loadLeaderboard();
  </script>
</body>
</html>
